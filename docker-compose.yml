version: '3.8'

services:
  # 后端服务
  snippetx-api:
    build: ./snippetx-backend
    container_name: snippetx-api
    ports:
      - "9999:9999"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PASS=123456 # 请在生产环境修改
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASS=snippetx123
      - MAIL_USER=admin@yourdomain.com
      - MAIL_PASS=your_mail_pass
      - SNIPPETX_JWT_SECRET=your_long_random_secret_string
    depends_on:
      - mysql
      - redis
    networks:
      - snippetx-net

  # 数据库
  mysql:
    image: mysql:8.0
    container_name: snippetx-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=snippetx
      - MYSQL_ROOT_PASSWORD=123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./snippetx-backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - snippetx-net

  # 缓存
  redis:
    image: redis:latest
    container_name: snippetx-redis
    command: redis-server --requirepass snippetx123
    ports:
      - "6379:6379"
    networks:
      - snippetx-net

  # Nginx 反向代理 (HTTPS 8443)
  nginx:
    image: nginx:alpine
    container_name: snippetx-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - snippetx-api
    networks:
      - snippetx-net

networks:
  snippetx-net:
    driver: bridge

volumes:
  mysql_data:
