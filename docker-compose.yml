version: '3.8'

services:
  # 后端服务
  snippetx-api:
    build: ./snippetx-backend
    container_name: snippetx-api
    ports:
      - "9999:9999"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PASS=${DB_ROOT_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - SNIPPETX_JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mysql
      - redis
    networks:
      - snippetx-net

  # 数据库
  mysql:
    image: mysql:8.0
    container_name: snippetx-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./snippetx-backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - snippetx-net

  # 缓存
  redis:
    image: redis:latest
    container_name: snippetx-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - snippetx-net

  # Nginx 反向代理 (HTTPS)
  nginx:
    image: nginx:alpine
    container_name: snippetx-nginx
    ports:
      - "${NGINX_HTTPS_PORT}:${NGINX_HTTPS_PORT}"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - snippetx-api
    networks:
      - snippetx-net

networks:
  snippetx-net:
    driver: bridge

volumes:
  mysql_data:
