spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/snippetx?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
  mail:
    host: ${MAIL_HOST:smtpdm.aliyun.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}

snippetx:
  jwt:
    secret: ${SNIPPETX_JWT_SECRET}
